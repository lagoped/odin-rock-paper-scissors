<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors Exercise</title>
</head>

<body>
    <div class="header">
        <div>
            <div>Points to win : 5</div>
            <div>Current round : X</div>
        </div>
        <div>
            <div id="player-score">
                Player Score
            </div>
            <div id="computer-score">
                Computer Score
            </div>
        </div>
    </div>
    <div class="game">
        <div id="rock" class="game-option">
            <img src="img/rock.png" alt="Rock" class="game-option-img">
            <button id="rock-button" class="game-option-button">Rock</button>
        </div>
        <div id="paper" class="game-option">
            <img src="img/paper.png" alt="Paper" class="game-option-img">
            <button id="paper-button" class="game-option-button">Paper</button>
        </div>
        <div id="scissors" class="game-option">
            <img src="img/scissors.png" alt="Scissors" class="game-option-img">
            <button id="scissors-button" class="game-option-button">Scissors</button>
        </div>
    </div>
</body>


<script src="game.js"></script>
<script>
    console.log("test");
</script>

</html>
